# Gemini Dispatch
#
# Routes GitHub events to the appropriate Gemini workflow.
# Handles automatic reviews on PR open/update and on-demand reviews via
# @gemini-cli mentions in PR comments and reviews.
#
# Supported @gemini-cli commands:
#   @gemini-cli            — request a code review
#   @gemini-cli  <context> — review with extra focus area
#   @gemini-cli <anything>        — also triggers a review

name: Gemini Dispatch

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

defaults:
  run:
    shell: bash

jobs:
  dispatch:
    # Automatic: non-draft, non-fork PRs
    # On-demand: OWNER/MEMBER/COLLABORATOR comments/reviews starting with @gemini-cli
    if: |-
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.fork == false
      ) || (
        (github.event.issue.pull_request || github.event.pull_request) &&
        github.event.sender.type == 'User' &&
        startsWith(github.event.comment.body || github.event.review.body || '', '@gemini-cli') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || github.event.review.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      command: ${{ steps.extract_command.outputs.command }}
      additional_context: ${{ steps.extract_command.outputs.additional_context }}
      pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}

    steps:
      - name: Extract command
        id: extract_command
        uses: actions/github-script@v7
        env:
          EVENT_TYPE: ${{ github.event_name }}.${{ github.event.action }}
          REQUEST: ${{ github.event.comment.body || github.event.review.body || '' }}
        with:
          script: |
            const eventType = process.env.EVENT_TYPE;
            const request = (process.env.REQUEST || '').trim();

            if (eventType.startsWith('pull_request.')) {
              core.setOutput('command', 'review');
            } else if (request.startsWith('@gemini-cli')) {
              // Strip "@gemini-cli /review" or just "@gemini-cli"; remainder is additional context
              const additionalContext = request.replace(/^@gemini-cli(\s*\/review)?/, '').trim();
              core.setOutput('command', 'review');
              core.setOutput('additional_context', additionalContext);
            } else {
              core.setOutput('command', 'fallthrough');
            }

      - name: Acknowledge manual request
        # Only post an acknowledgment for on-demand triggers, not automatic PR events
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "Hi @${{ github.actor }}, I've received your request and I'm working on it! Track progress in [the logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --repo "${REPOSITORY}"

  review:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.command == 'review' }}
    uses: ./.github/workflows/gemini-review.yml
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    with:
      additional_context: ${{ needs.dispatch.outputs.additional_context }}
      pr_number: ${{ needs.dispatch.outputs.pr_number }}
    secrets: inherit

  fallthrough:
    needs: [dispatch, review]
    if: ${{ always() && !cancelled() && (failure() || needs.dispatch.outputs.command == 'fallthrough') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Post error comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "Sorry @${{ github.actor }}, I was unable to process your request. Please [see the logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
            --repo "${REPOSITORY}"
